name: Refresh DineScores Data

on:
  schedule:
    # Every Sunday at 9:00 AM UTC (3:00 AM CST / 4:00 AM CDT)
    - cron: '0 9 * * 0'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write  # Needed to commit data.js back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install requests

      - name: Run data pipeline (Chicago, NYC, SF + DFW metro)
        env:
          # Optional: raises Socrata rate limits if the secret is configured
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
        run: |
          python3 dinescores_pipeline.py \
            --mode weekly \
            --cities chicago nyc sf austin boston seattle florida houston dc dallas plano frisco fort-worth-texas tarrant arlington richardson \
            --output /tmp/dinescores_data.json \
            --output-data-js public/data.js \
            --merge-existing-data-js public/data.js \
            --output-d1-sql /tmp/dinescores_weekly.sql
        # --merge-existing-data-js is essential: weekly mode only pulls the
        # last 8 days, and merging preserves the accumulated dataset instead
        # of overwriting it. DFW fetches are failure-tolerant — if the portal
        # blocks the runner, existing DFW records are kept via the merge.

      - name: Show data summary
        run: |
          python3 -c "
          import json
          with open('public/data.js') as f:
              content = f.read()
          # Extract the JSON part
          data = json.loads(content.split('window.DATA = ', 1)[1].rstrip(';\n'))
          from collections import Counter
          cities = Counter(r['c'] for r in data)
          print(f'Total restaurants: {len(data)}')
          for city, count in sorted(cities.items()):
              print(f'  {city}: {count}')
          "

      - name: Update D1 database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Cloudflare secrets not configured — skipping D1 update."
            echo "Run the 'Setup D1 Database' workflow prerequisites to enable it."
            exit 0
          fi
          npx --yes wrangler@4 d1 execute dinescores --remote -y \
            --file /tmp/dinescores_weekly.sql

      - name: Commit updated data.js
        run: |
          git config --global user.name "DineScores Bot"
          git config --global user.email "bot@dinescores.com"
          git add public/data.js
          if git diff --staged --quiet; then
            echo "No changes to data.js — already up to date"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d')
            git commit -m "Auto-refresh: ${TIMESTAMP} weekly inspection data update"
            git push
            echo "Successfully pushed updated data.js"
          fi
