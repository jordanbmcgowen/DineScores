name: Setup D1 Database

# One-time (idempotent) setup for the Cloudflare D1 database:
#   1. Creates the "dinescores" D1 database if it doesn't exist
#   2. Loads the committed seeds (data/d1_seed*.sql.gz — the full multi-city
#      dataset plus any expansion seeds added since)
#   3. Writes wrangler.toml with the D1 binding and commits it, which makes
#      the /api/* Pages Functions live on the next deploy
#
# Prerequisites (browser-only, no local tools needed):
#   - Repo secret CLOUDFLARE_API_TOKEN: dash.cloudflare.com -> profile icon ->
#     My Profile -> API Tokens -> Create Token -> Custom token with permissions
#     "Account | D1 | Edit" and "Account | Cloudflare Pages | Read"
#   - Repo secret CLOUDFLARE_ACCOUNT_ID: shown in the right sidebar of any
#     domain page on dash.cloudflare.com (or under Workers & Pages)
# Then: GitHub -> Actions -> "Setup D1 Database" -> Run workflow.

on:
  workflow_dispatch:
    inputs:
      seeds:
        description: 'Glob of seed files to load (e.g. data/d1_seed_2*.sql.gz to load only an expansion seed)'
        required: false
        default: 'data/d1_seed*.sql.gz'

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DB_NAME: dinescores

    steps:
      - name: Check secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID repo secrets."
            echo "See the comment at the top of .github/workflows/setup-database.yml for setup steps."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Create D1 database if it doesn't exist
        run: |
          set -e
          LIST=$(npx --yes wrangler@4 d1 list --json)
          DB_ID=$(echo "$LIST" | python3 -c "import json,sys; dbs=json.load(sys.stdin); print(next((d['uuid'] for d in dbs if d['name']=='$DB_NAME'), ''))")
          if [ -z "$DB_ID" ]; then
            echo "Creating D1 database '$DB_NAME'..."
            npx --yes wrangler@4 d1 create "$DB_NAME"
            LIST=$(npx --yes wrangler@4 d1 list --json)
            DB_ID=$(echo "$LIST" | python3 -c "import json,sys; dbs=json.load(sys.stdin); print(next((d['uuid'] for d in dbs if d['name']=='$DB_NAME'), ''))")
          else
            echo "D1 database '$DB_NAME' already exists ($DB_ID)"
          fi
          test -n "$DB_ID"
          echo "DB_ID=$DB_ID" >> "$GITHUB_ENV"

      - name: Load seed data
        run: |
          set -e
          # Selected seeds, in lexical order: by default the original full
          # seed plus any expansion seeds (data/d1_seed_*.sql.gz) added
          # since. Upserts are idempotent, so reloading an already-applied
          # seed is safe; pass a narrower glob to load only a new seed.
          for SEED in ${{ github.event.inputs.seeds || 'data/d1_seed*.sql.gz' }}; do
            echo "Loading $SEED..."
            gunzip -c "$SEED" > /tmp/d1_seed.sql
            wc -l /tmp/d1_seed.sql
            npx --yes wrangler@4 d1 execute "$DB_NAME" --remote --file /tmp/d1_seed.sql -y
          done

      - name: Verify row counts
        run: |
          npx --yes wrangler@4 d1 execute "$DB_NAME" --remote -y --json \
            --command "SELECT (SELECT COUNT(*) FROM restaurants) AS restaurants, (SELECT COUNT(*) FROM inspections) AS inspections"

      - name: Detect Pages project name
        run: |
          PROJECT=$(npx --yes wrangler@4 pages project list 2>/dev/null | grep -oE '^\| [A-Za-z0-9_-]+' | sed 's/^| //' | head -1 || true)
          if [ -z "$PROJECT" ]; then
            echo "::warning::Could not detect a Cloudflare Pages project (token may lack Pages:Read). Defaulting to 'dinescores' — edit wrangler.toml if your Pages project has a different name."
            PROJECT=dinescores
          fi
          echo "Detected Pages project: $PROJECT"
          echo "PAGES_PROJECT=$PROJECT" >> "$GITHUB_ENV"

      - name: Write wrangler.toml with D1 binding and commit
        run: |
          cat > wrangler.toml <<EOF
          # Cloudflare Pages configuration (generated by setup-database workflow).
          # Binds the D1 database to the /api/* Pages Functions as env.DB.
          name = "$PAGES_PROJECT"
          pages_build_output_dir = "public"
          compatibility_date = "2026-01-01"

          [[d1_databases]]
          binding = "DB"
          database_name = "$DB_NAME"
          database_id = "$DB_ID"
          EOF
          git config --global user.name "DineScores Bot"
          git config --global user.email "bot@dinescores.com"
          git add wrangler.toml
          if git diff --staged --quiet; then
            echo "wrangler.toml unchanged"
          else
            git commit -m "Add wrangler.toml with D1 binding (generated by setup-database workflow)"
            git push
          fi

      - name: Done
        run: |
          echo "D1 database is loaded. The wrangler.toml commit triggers a new"
          echo "deploy; once it finishes, verify: https://dinescores.com/api/cities"
