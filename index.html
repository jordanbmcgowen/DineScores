<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DineScores — Know Before You Go</title>
  <meta name="description" content="DineScores: Restaurant food safety scores and inspection data from official health department records. Know before you go.">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 2L4 8v8c0 7.18 5.12 13.88 12 16 6.88-2.12 12-8.82 12-16V8L16 2z' fill='%230d9488'/%3E%3Ctext x='16' y='21' text-anchor='middle' fill='white' font-size='13' font-weight='700' font-family='system-ui'%3EA%3C/text%3E%3C/svg%3E">

  <style>
    /* Pre-hydration loading overlay (self-contained — no framework CSS yet) */
    #loading-overlay {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px;
      background: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
      transition: opacity 0.4s ease;
    }
    #loading-overlay.fade-out { opacity: 0; pointer-events: none; }
    #loading-overlay .spinner {
      width: 36px; height: 36px;
      border: 3px solid #99f6e4; border-top-color: #0d9488;
      border-radius: 50%;
      animation: ds-spin 0.8s linear infinite;
    }
    #loading-overlay .brand { font-weight: 800; font-size: 18px; letter-spacing: -0.02em; color: #0f172a; }
    @keyframes ds-spin { to { transform: rotate(360deg); } }
    @media (prefers-color-scheme: dark) {
      #loading-overlay { background: #0f172a; }
      #loading-overlay .brand { color: #f1f5f9; }
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="brand">DineScores</div>
  </div>
  <div id="root"></div>
  <!-- Embedded dataset (regenerated weekly by CI) -->
  <script src="data.js"></script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
